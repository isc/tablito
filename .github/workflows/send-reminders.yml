name: Send reminders

# Rappel quotidien (Web Push). Cron horaire en UTC : le script ne notifie que
# les abonnés dont l'heure LOCALE est dans la fenêtre 18h–23h, et dédoublonne
# par date locale → un seul envoi/jour même si GitHub décale le run.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: send-reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Send daily reminders
        run: node scripts/send-reminders.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
