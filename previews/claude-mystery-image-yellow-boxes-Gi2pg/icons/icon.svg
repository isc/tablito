<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Fond plein indigo : pas de coins arrondis bakés, on laisse iOS/Android
       appliquer leur propre mask (maskable-compliant). -->
  <rect width="1024" height="1024" fill="#4F46BA"/>

  <!-- Médaillon cream centré, rayon 384 (diamètre 75 % du canvas). -->
  <circle cx="512" cy="512" r="384" fill="#FBF6EC"/>

  <!-- Piou — reprise du SVG de src/components/Mascot.tsx, cadré dans le
       médaillon via transform translate+scale. Origine du viewBox Piou (0..100)
       centrée sur (50, 61) → ramenée à (512, 512) du canvas 1024. -->
  <g transform="translate(112 24) scale(8)" stroke-linejoin="round">
    <!-- pattes -->
    <g fill="none" stroke="#1E1A2E" stroke-width="1.6" stroke-linecap="round">
      <path d="M40 88 L 40 94 M 36 94 L 44 94"/>
      <path d="M60 88 L 60 94 M 56 94 L 64 94"/>
    </g>

    <!-- corps -->
    <ellipse cx="50" cy="60" rx="28" ry="28" fill="#F0B43A" stroke="#1E1A2E" stroke-width="1.6"/>
    <!-- ventre -->
    <path d="M32 60 Q 50 82 68 60" fill="#FBD96C"/>
    <!-- aile gauche -->
    <path d="M30 58 Q 26 70 36 74 Q 40 68 38 60 Z" fill="#FBD96C" stroke="#1E1A2E" stroke-width="1.6"/>

    <!-- œil gauche -->
    <circle cx="43" cy="54" r="3" fill="#1E1A2E"/>
    <circle cx="44" cy="53" r="0.9" fill="#ffffff"/>
    <!-- œil droit -->
    <circle cx="57" cy="54" r="3" fill="#1E1A2E"/>
    <circle cx="58" cy="53" r="0.9" fill="#ffffff"/>

    <!-- bec -->
    <path d="M46 63 L 54 63 L 50 68 Z" fill="#D9751F" stroke="#1E1A2E" stroke-width="1.3"/>

    <!-- joues -->
    <circle cx="38" cy="62" r="2.5" fill="#E8623D" opacity="0.35"/>
    <circle cx="62" cy="62" r="2.5" fill="#E8623D" opacity="0.35"/>

    <!-- houppette -->
    <path d="M48 34 L 50 28 L 52 34" fill="none" stroke="#1E1A2E" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>
