<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#4F46BA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Fontes self-hostées (cf. scripts/vendor-fonts.mjs). Précachées par
         le SW, donc 0 réseau dès la 2e visite et identité visuelle conservée
         offline. Préchargement de la fonte la plus critique (Nunito normal,
         body text + landing) pour aplatir le waterfall CSS → woff2 sur la
         1re visite. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          href="/multiplix/fonts/nunito-normal-aBTMnFcQ.woff2" />
    <link rel="stylesheet" href="/multiplix/fonts/fonts.css" />

    <!-- Anti-FOUC : couleur de fond + fonte fallback appliquées dès le premier
         paint, avant que la feuille de styles principale ne soit injectée. -->
    <style>
      html, body { background: #FBF6EC; color: #1E1A2E; }
      body { font-family: 'Nunito', 'SF Pro Text', system-ui, sans-serif; margin: 0; }
    </style>

    <!-- Splash screens iOS (PWA) — un PNG par couple (taille × DPR).
         Couvre iPhone 12/13/14/15/16 (standard, Pro, Pro Max) + iPad Pro 11".
         Les autres appareils iOS auront un splash vide. Régénérer via
         `npm run splash`. -->
    <link rel="apple-touch-startup-image" href="splash/iphone-1170x2532.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1179x2556.png"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1290x2796.png"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/ipad-1668x2388.png"
          media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <title>Multiplix</title>

    <script type="importmap">
    {
      "imports": {
        "preact":              "/multiplix/vendor/preact/preact.module.js",
        "preact/hooks":        "/multiplix/vendor/preact/hooks.module.js",
        "preact/compat":       "/multiplix/vendor/preact/compat.module.js",
        "preact/jsx-runtime":  "/multiplix/vendor/preact/jsx-runtime.module.js",
        "react":               "/multiplix/vendor/preact/compat.module.js",
        "react-dom":           "/multiplix/vendor/preact/compat.module.js",
        "react-dom/client":    "/multiplix/vendor/preact/compat-client.mjs",
        "virtual:pwa-register":"/multiplix/pwa-register.js"
      }
    }
    </script>
      <link rel="stylesheet" href="/multiplix/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/multiplix/src/main.js"></script>
  </body>
</html>
